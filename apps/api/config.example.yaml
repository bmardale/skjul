database:
    database_url: "postgres://user:password@localhost:5432/skjul?sslmode=disable"
    max_open_conns: 25
    max_idle_conns: 10
    conn_max_lifetime: 30m
    conn_max_idle_time: 5m

http:
    host: "0.0.0.0"
    port: 8080
    read_timeout: 10s
    write_timeout: 10s
    idle_timeout: 120s

logger:
    level: "info"
    format: "json"
