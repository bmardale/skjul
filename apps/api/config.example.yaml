database:
    database_url: "postgres://user:password@localhost:5432/skjul?sslmode=disable"
    max_open_conns: 25
    max_idle_conns: 10
    conn_max_lifetime: 30m
    conn_max_idle_time: 5m

http:
    host: "0.0.0.0"
    port: 8080
    read_timeout: 10s
    write_timeout: 10s
    idle_timeout: 120s

logger:
    level: "info"
    format: "json"

invitations:
    require_invite_code: false
    default_quota: 5

admin:
    admins: []

s3:
    bucket: "skjul-attachments"
    region: "us-east-1"
    endpoint: ""
    access_key_id: ""
    secret_access_key: ""
    presign_expiry: 15m
    cdn_base_url: "https://cdn.example.com"

cleanup:
    enabled: true
    interval: 10m

rate_limit:
    enabled: true
    register:
        requests: 3
        window: 10m
        burst: 3
    login_challenge:
        requests: 10
        window: 1m
        burst: 10
    login:
        requests: 5
        window: 1m
        burst: 5
    paste_get:
        requests: 60
        window: 1m
        burst: 60
    entry_ttl: 30m
    cleanup_interval: 5m
