version: "2"
sql:
  - engine: postgresql
    queries: ./sql
    schema: ./internal/db/migrations/sql
    gen:
      go:
        package: sqlc
        out: ./internal/db/sqlc
        sql_package: pgx/v5
        emit_interface: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
