services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: skjul
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: <CHANGE_ME>
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_DATABASE_URL: postgres://skjul:skjul_change_me@postgres:5432/skjul?sslmode=disable
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
